name: macOS PDF合并分割工具打包

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      # 1. 拉取代码
      - name: 检出代码
        uses: actions/checkout@v4
      
      # 2. 设置 Python 环境
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # wxPython 推荐用 3.11
      
      # 3. 缓存 pip 依赖（加速后续构建）
      - name: 缓存 pip 包
        uses: actions/cache@v3
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      # 4. 安装依赖
      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install wxPython PyPDF2
          pip install nuitka
      
      # 5. 检查 about.png 是否存在（可选，用于调试）
      - name: 检查资源文件
        run: |
          if [ -f "about.png" ]; then
            echo "✅ about.png 存在"
          else
            echo "⚠️ 警告: about.png 不存在，关于对话框将无法显示图片"
          fi
      
      # 6. 使用 Nuitka 打包
      - name: Nuitka 打包
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=wxpython \
            --follow-imports \
            --include-data-files=about.png=about.png \
            --macos-create-app-bundle \
            --output-dir=build \
            --remove-output \
            pdf_tool.py
        # --remove-output: 打包完成后删除临时文件
        # 注意：把 pdf_tool.py 改成你的实际文件名
      
      # 7. 清理不必要的临时文件
      - name: 清理临时文件
        run: |
          echo "开始清理临时文件..."
          
          # 删除 Nuitka 编译缓存
          rm -rf pdf_tool.build
          rm -rf pdf_tool.dist
          rm -rf __pycache__
          rm -rf *.pyc
          
          # 删除打包过程中可能产生的临时目录
          rm -rf build/pdf_tool.build
          rm -rf build/__pycache__
          find build -name "*.pyc" -delete
          find build -name "__pycache__" -type d -delete
          
          # 删除编译日志（如果不需要）
          rm -f compile.log
          
          echo "✅ 清理完成"
      
      # 8. 重命名产物（方便识别）
      - name: 重命名可执行文件
        run: |
          if [ -f "build/pdf_tool.dist/pdf_tool" ]; then
            mv build/pdf_tool.dist/pdf_tool build/PDF合并分割工具
            rm -rf build/pdf_tool.dist
          elif [ -f "build/pdf_tool" ]; then
            mv build/pdf_tool build/PDF合并分割工具
          elif [ -f "pdf_tool.dist/pdf_tool" ]; then
            mv pdf_tool.dist/pdf_tool PDF合并分割工具
            rm -rf pdf_tool.dist
          fi
          
          # 清理其他可能的临时目录
          rm -rf pdf_tool.onefile-build
          rm -rf pdf_tool.build
          rm -rf __pycache__
        continue-on-error: true
      
      # 9. 打包最终产物为压缩包（可选，便于下载）
      - name: 压缩最终产物
        run: |
          if [ -f "build/PDF合并分割工具" ]; then
            cd build
            zip -r ../PDF合并分割工具-macOS.zip PDF合并分割工具
            cd ..
          elif [ -f "PDF合并分割工具" ]; then
            zip -r PDF合并分割工具-macOS.zip PDF合并分割工具
          fi
        continue-on-error: true
      
      # 10. 上传打包产物
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: PDF合并分割工具-macOS
          path: |
            build/PDF合并分割工具
            PDF合并分割工具-macOS.zip
            !build/*.build
            !build/*.dist
            !**/__pycache__
            !**/*.pyc
          if-no-files-found: warn
      
      # 11. 最终清理（确保工作空间干净）
      - name: 最终清理
        if: always()  # 即使前面的步骤失败也执行清理
        run: |
          echo "执行最终清理..."
          rm -rf pdf_tool.build
          rm -rf pdf_tool.dist
          rm -rf pdf_tool.onefile-build
          rm -rf __pycache__
          rm -rf build/*.build
          rm -rf build/*.dist
          rm -f compile.log
          echo "✅ 最终清理完成"
