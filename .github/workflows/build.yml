name: macOS PDF合并分割工具打包

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 缓存 pip 包
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install wxPython PyPDF2
          pip install nuitka
          pip install ordered-set
      
      - name: 检查资源文件
        run: |
          if [ -f "about.png" ]; then
            echo "✅ about.png 存在"
            ls -lh about.png
          else
            echo "⚠️ 警告: about.png 不存在"
          fi
      
      - name: 检查 Python 文件
        run: |
          if [ -f "pdf_tool.py" ]; then
            echo "✅ 找到主程序: pdf_tool.py"
          else
            echo "❌ 错误: 找不到 pdf_tool.py"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi
      
      - name: 测试 Python 脚本
        run: |
          python -c "import wx; print(f'wxPython version: {wx.__version__}')"
          python -c "import PyPDF2; print(f'PyPDF2 version: {PyPDF2.__version__}')"
          python -m py_compile pdf_tool.py
          echo "✅ Python 脚本语法正确"
      
      - name: Nuitka 打包
        run: |
          python -m nuitka \
            --standalone \
            --onefile \
            --enable-plugin=wxpython \
            --follow-imports \
            --macos-create-app-bundle \
            --output-dir=build \
            --remove-output \
            --assume-yes-for-downloads \
            pdf_tool.py
        continue-on-error: false
      
      - name: 处理 about.png 资源
        run: |
          # 如果有 about.png，复制到构建目录
          if [ -f "about.png" ]; then
            if [ -d "build/pdf_tool.dist" ]; then
              cp about.png build/pdf_tool.dist/
            fi
            echo "✅ 已处理 about.png"
          fi
      
      - name: 查找生成的文件
        run: |
          echo "查找生成的文件..."
          echo "build 目录内容:"
          ls -la build/
          if [ -d "build/pdf_tool.dist" ]; then
            echo "pdf_tool.dist 目录内容:"
            ls -la build/pdf_tool.dist/
          fi
      
      - name: 重命名产物
        run: |
          if [ -d "build/pdf_tool.app" ]; then
            mv build/pdf_tool.app build/PDF合并分割工具.app
            echo "✅ 找到并重命名 .app bundle"
          elif [ -d "build/pdf_tool.dist/pdf_tool.app" ]; then
            mv build/pdf_tool.dist/pdf_tool.app build/PDF合并分割工具.app
            echo "✅ 找到并重命名 .app bundle"
          elif [ -f "build/pdf_tool" ]; then
            mv build/pdf_tool build/PDF合并分割工具
            echo "✅ 找到并重命名可执行文件"
          elif [ -f "build/pdf_tool.dist/pdf_tool" ]; then
            mv build/pdf_tool.dist/pdf_tool build/PDF合并分割工具
            echo "✅ 找到并重命名可执行文件"
          else
            echo "⚠️ 警告: 未找到生成的可执行文件"
          fi
        continue-on-error: true
      
      - name: 创建 ZIP 压缩包
        run: |
          if [ -d "build/PDF合并分割工具.app" ]; then
            echo "正在打包 .app 文件..."
            cd build
            zip -r ../PDF合并分割工具-macOS.zip "PDF合并分割工具.app"
            cd ..
            echo "✅ 已创建 ZIP 包"
          elif [ -f "build/PDF合并分割工具" ]; then
            echo "正在打包可执行文件..."
            cd build
            zip -r ../PDF合并分割工具-macOS.zip "PDF合并分割工具"
            cd ..
            echo "✅ 已创建 ZIP 包"
          else
            echo "⚠️ 未找到可打包的文件"
            zip -r PDF合并分割工具-macOS.zip build/
          fi
        continue-on-error: true
      
      - name: 清理临时文件
        run: |
          echo "开始清理临时文件..."
          rm -rf pdf_tool.build
          rm -rf pdf_tool.dist
          rm -rf pdf_tool.onefile-build
          rm -rf __pycache__
          rm -rf *.pyc
          rm -rf *.pyo
          rm -rf build/*.build
          rm -rf build/*.dist
          find . -name "*.pyc" -delete 2>/dev/null || true
          find . -name "__pycache__" -type d -delete 2>/dev/null || true
          rm -f compile.log
          rm -f nuitka-log.txt
          echo "✅ 清理完成"
      
      - name: 检查最终产物
        run: |
          echo "最终产物检查:"
          if [ -f "PDF合并分割工具-macOS.zip" ]; then
            echo "✅ ZIP 包存在"
            ls -lh PDF合并分割工具-macOS.zip
          elif [ -d "build/PDF合并分割工具.app" ]; then
            echo "✅ .app 包存在"
            ls -ld build/PDF合并分割工具.app
          elif [ -f "build/PDF合并分割工具" ]; then
            echo "✅ 可执行文件存在"
            ls -lh build/PDF合并分割工具
          else
            echo "❌ 未找到任何产物"
            ls -laR build/
          fi
      
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: PDF合并分割工具-macOS
          path: |
            PDF合并分割工具-macOS.zip
            build/PDF合并分割工具.app
            build/PDF合并分割工具
          if-no-files-found: warn
          compression-level: 9
      
      - name: 最终清理
        if: always()
        run: |
          echo "执行最终清理..."
          rm -rf pdf_tool.build
          rm -rf pdf_tool.dist
          rm -rf pdf_tool.onefile-build
          rm -rf __pycache__
          rm -rf build/*.build
          rm -rf build/*.dist
          rm -f compile.log
          echo "✅ 最终清理完成"
