name: macOS PDF合并分割工具打包

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 缓存 pip 包
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: 安装系统依赖
        run: |
          brew install pkg-config
          brew install libjpeg
          brew install libpng
          brew install libtiff
          brew install libx11
          brew install gcc
      
      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install wheel
          pip install wxPython PyPDF2
          pip install nuitka
          pip install ordered-set
      
      - name: 验证文件存在
        run: |
          if [ ! -f "pdf_tool.py" ]; then
            echo "❌ 错误: 找不到 pdf_tool.py"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi
          
          if [ -f "about.png" ]; then
            echo "✅ about.png 存在"
            ls -lh about.png
          else
            echo "⚠️ 警告: about.png 不存在"
          fi
      
      - name: 测试 Python 环境
        run: |
          python --version
          python -c "import wx; print(f'wxPython: {wx.__version__}')"
          python -c "import PyPDF2; print(f'PyPDF2: {PyPDF2.__version__}')"
          python -m py_compile pdf_tool.py && echo "✅ 语法正确"
      
      - name: Nuitka 打包（详细调试）
        run: |
          # 清理之前的构建
          rm -rf build pdf_tool.build pdf_tool.dist
          
          # 详细模式打包
          python -m nuitka \
            --standalone \
            --macos-create-app-bundle \
            --enable-plugin=wxpython \
            --follow-imports \
            --include-data-file=about.png=about.png \
            --output-dir=build \
            --remove-output \
            --assume-yes-for-downloads \
            --show-progress \
            --verbose \
            --report=build-report.xml \
            pdf_tool.py 2>&1 | tee nuitka-build.log
          
          # 检查构建日志中的错误
          if grep -i "error" nuitka-build.log; then
            echo "发现错误，请检查日志"
            cat nuitka-build.log
            exit 1
          fi
      
      - name: 查找生成的文件
        run: |
          echo "查找生成的文件..."
          echo "build 目录内容:"
          ls -la build/
          find . -name "*.app" -type d
      
      - name: 重命名产物
        run: |
          if [ -d "build/pdf_tool.app" ]; then
            mv build/pdf_tool.app build/PDF合并分割工具.app
            echo "✅ 找到 .app bundle"
          elif [ -d "build/pdf_tool.dist/pdf_tool.app" ]; then
            mv build/pdf_tool.dist/pdf_tool.app build/PDF合并分割工具.app
            echo "✅ 找到 .app bundle"
          else
            echo "⚠️ 未找到 .app 包"
          fi
      
      - name: 创建 ZIP 压缩包
        run: |
          if [ -d "build/PDF合并分割工具.app" ]; then
            cd build
            zip -r ../PDF合并分割工具-macOS.zip "PDF合并分割工具.app"
            cd ..
            echo "✅ ZIP 包创建成功"
          else
            echo "⚠️ 未找到 .app 包"
          fi
      
      - name: 检查最终产物
        run: |
          if [ -f "PDF合并分割工具-macOS.zip" ]; then
            ls -lh PDF合并分割工具-macOS.zip
            echo "✅ 产物准备就绪"
          else
            echo "❌ 未找到产物"
          fi
      
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: PDF合并分割工具-macOS
          path: PDF合并分割工具-macOS.zip
          if-no-files-found: warn
